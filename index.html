const itemsPerPage = 12;

function formatViews(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1_000) return Math.floor(n / 1_000) + 'K';
  return n.toString();
}

function renderVideos() {
  const start = (currentPage - 1) * itemsPerPage;
  const pageItems = videos.slice(start, start + itemsPerPage);

  const grid = document.getElementById('grid');
  grid.innerHTML = pageItems.map(v => `
    <div class="video-card bg-zinc-900 rounded-xl overflow-hidden cursor-pointer" onclick="window.open('${v.terabox}', '_blank')">

          <span>${formatViews(v.views)} views</span>
          <span class="text-orange-400">Download</span>
        </div>
      </div>
    </div>
  `).join('');
}

function renderPagination() {
  const totalPages = Math.ceil(videos.length / itemsPerPage);
  const pag = document.getElementById('pagination');
  pag.innerHTML = '';

  // Previous
  pag.innerHTML += `
    <a href="?page=${currentPage - 1}" class="${currentPage <= 1 ? 'disabled' : ''}">« Prev</a>
  `;

  // Page numbers
  for (let i = 1; i <= totalPages; i++) {
    pag.innerHTML += `
      <a href="?page=${i}" class="${i === currentPage ? 'active' : ''}">${i}</a>
    `;
  }

  // Next
  pag.innerHTML += `
    <a href="?page=${currentPage + 1}" class="${currentPage >= totalPages ? 'disabled' : ''}">Next »</a>
  `;
}

function render() {
  renderVideos();
  renderPagination();
}

// Fake view counter (every ~9 seconds)
